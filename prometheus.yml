global:
  scrape_interval:     15s
  external_labels:
    monitor: 'railway-prom'

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'demo_prometheus_metrics'
    scrape_interval: 5s
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['railway-prometheus-production-24ce.up.railway.app']

  - job_name: 'postgres_metrics_collector'
    scrape_interval: 1s
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['postgres-metrics-collector-staging.up.railway.app']

  - job_name: 'lucidserum-api'
    metrics_path: /metrics
    scheme: https
    authorization:
      type: Bearer
      credentials: /tmp/lucidserum-metrics-token
    static_configs:
      - targets: ['lucidserum-api.railway.internal']
      
